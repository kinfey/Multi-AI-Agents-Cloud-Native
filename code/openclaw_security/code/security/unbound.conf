# unbound.conf — DNS query audit
# All DNS queries from OpenClaw containers are routed through this container.
# Every query is logged to stdout (visible via docker logs).
# Any suspicious domain resolution by OpenClaw will be immediately visible.

server:
    # Bind all interfaces (Docker bridge network)
    interface: 0.0.0.0
    port: 53

    # Disable chroot (not needed in Docker container, avoids permission issues)
    chroot: ""

    # Allow only podcast-net subnet (172.20.0.0/16)
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow     # Docker bridge default range
    access-control: 192.168.0.0/16 allow    # Custom subnet

    # ── Core security settings ─────────────────────────
    # Log all DNS queries
    verbosity: 2
    log-queries: yes
    log-replies: yes
    log-tag-queryreply: yes

    # Output to stdout (captured by docker logs)
    use-syslog: no
    logfile: ""

    # Hide identity and version info
    hide-identity: yes
    hide-version: yes

    # Disable recursive queries (forward-only)
    do-not-query-localhost: no

    # Minimal TTL (for faster detection of DNS changes)
    cache-min-ttl: 0
    cache-max-ttl: 300

    # DNSSEC validation
    val-log-level: 2

    # Thread count (lightweight)
    num-threads: 1
    so-rcvbuf: 1m

    # Private address protection
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: fc00::/7

# Upstream DNS forwarding (Cloudflare + Google, plaintext UDP/53)
forward-zone:
    name: "."
    forward-tls-upstream: no
    forward-addr: 1.1.1.1
    forward-addr: 1.0.0.1
    forward-addr: 8.8.8.8
    forward-addr: 8.8.4.4
