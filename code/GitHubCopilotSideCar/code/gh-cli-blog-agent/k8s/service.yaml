apiVersion: v1
kind: Service
metadata:
  name: blog-agent-svc
  labels:
    app: blog-agent
spec:
  type: NodePort
  selector:
    app: blog-agent
  ports:
    # Main container (Nginx) - blog viewer & reverse proxy to sidecars
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
    # Sidecar 1 (Copilot Agent) - direct agent API access
    - name: agent-api
      port: 8001
      targetPort: 8001
      nodePort: 30082
    # Sidecar 2 (Skill Server) - direct skill API access
    - name: skill-api
      port: 8002
      targetPort: 8002
      nodePort: 30083
