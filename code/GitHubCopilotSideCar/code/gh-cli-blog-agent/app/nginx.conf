server {
    listen 80;
    server_name localhost;

    # Main page - sidecar viewer
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Serve generated blog files from shared volume
    location /blog/ {
        alias /usr/share/nginx/html/blog/;
        autoindex on;
        autoindex_format html;
        types {
            text/markdown md;
            text/plain txt;
        }
        default_type text/plain;
    }

    # Reverse-proxy to the copilot-agent sidecar (localhost:8001 in same Pod)
    location /agent/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Reverse-proxy to the skill-server sidecar (localhost:8002 in same Pod)
    location /skill/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for sidecar
    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
